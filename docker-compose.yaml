
services:
  frontend:
    build:
      context: ./okane.frontend
    ports:
      - "3000:3000"
    environment:
      API_URL: http://app:8080
      ENCRYPTION_KEY: d4f8a1c72b9e5d4a8f31c6e0b7a29d5f4c8e1a73b6d90f2c7e4a1b5d8c3f6e92
      NODE_ENV: production
    depends_on:
      - app
  app:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://*:8080
      - ConnectionStrings__DefaultConnection=Host=database;Port=5432;Database=okane;Username=okane;Password=okane
      - JwtOptions__SecretKey=OBgakiY8lqC7IQJjSXowcdiKx2OEr3mB
    depends_on:
      - database
  database:
    image: postgres:latest
    environment:
      POSTGRES_USER: okane
      POSTGRES_PASSWORD: okane
      POSTGRES_DB: okane
    ports:
      - "5432:5432"
    volumes:
      - ./Migrations:/docker-entrypoint-initdb.d/
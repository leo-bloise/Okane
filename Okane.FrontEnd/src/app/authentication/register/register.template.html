<header>
  <app-logo primaryColor="black"
            [removeBackground]="true"
            width="120"
            height="120"></app-logo>
  <app-title>Sign up for an account</app-title>
  <p>Create your account to get started</p>
</header>
<main>
  <form>
    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput type="email" placeholder="youremail@domain.com" name="email" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput type="password" placeholder="Enter your password" name="password" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Confirm Password</mat-label>
      <input matInput type="password" placeholder="Confirm your password" name="confirmPassword" />
    </mat-form-field>
    <button matButton="filled">Create Account</button>
    <p id="login_link">
      Alreasy have an account? 
      <a mat-button [routerLink]="['/']">Login</a>
    </p>
  </form>
</main>

<header>
  <app-logo primaryColor="black"
            [removeBackground]="true"
            width="120"
            height="120"></app-logo>
  <app-title>Login to your account</app-title>
  <p>Welcome back! Enter your details to log in to your account</p>
</header>
<main>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit($event)">
    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput type="email" placeholder="youremail@domain.com" name="email" formControlName="email" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput type="password" placeholder="Enter your password" name="password" formControlName="password" />
    </mat-form-field>
    <button matButton="filled">Login</button>
    <p id="register_link">
      Don't have an account?
      <a mat-button [routerLink]="['/register']">Sign up</a>
    </p>
  </form>
</main>
